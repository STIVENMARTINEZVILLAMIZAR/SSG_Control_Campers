<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Campers | SSG</title>
	<link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
	<div class="shell">
		<header class="topbar">
			<div class="brand"><div class="logo">SSG</div><div><small>Modulo</small><strong th:text="${titulo}">Campers</strong></div></div>
			<nav class="nav"><a href="/dashboard">Dashboard</a><a href="/modulos/computadores">Computadores</a><a href="/modulos/prestamos">Prestamos</a><a href="/modulos/incidencias">Incidencias</a></nav>
		</header>
		<section class="panel">
			<div class="section-title"><div><h2 th:text="${titulo}">Modulo de campers</h2><p th:text="${descripcion}">Descripcion</p></div></div>
			<div class="table-wrap">
				<table>
					<thead><tr><th>ID</th><th>Documento</th><th>Nombre</th><th>Correo</th><th>Clan</th><th>Activo</th></tr></thead>
					<tbody>
						<tr th:each="item : ${items}">
							<td th:text="${item.id}">1</td>
							<td th:text="${item.documento}">1090</td>
							<td th:text="${item.nombreCompleto}">Nombre</td>
							<td th:text="${item.correo}">correo</td>
							<td th:text="${item.clan}">Clan</td>
							<td th:text="${item.activo} ? 'Si' : 'No'">Si</td>
						</tr>
					</tbody>
				</table>
			</div>
		</section>
	</div>
</body>
</html>
